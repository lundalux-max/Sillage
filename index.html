  <!-- Read theme from localStorage BEFORE first paint to avoid flash -->
  <script>
    (function(){
      try {
        var t = localStorage.getItem('parfymevelger_theme');
        var effective;
        if (t === 'day' || t === 'night') {
          effective = t;
        } else {
          effective = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'night' : 'day';
        }
        if (effective === 'day') document.documentElement.setAttribute('data-theme','day');
      } catch(e){}
    })();
  </script>

function getSeason(month) {
  if (month >= 3 && month <= 5) return 'spring';
  if (month >= 6 && month <= 8) return 'summer';
  if (month >= 9 && month <= 11) return 'fall';
  return 'winter';
}

function weatherCondition(code) {
  if (code === 0) return 'clear';
  if (code <= 3) return 'cloudy';
  if (code === 45 || code === 48) return 'fog';
  if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82)) return 'rain';
  if (code >= 71 && code <= 77) return 'snow';
  if (code >= 95) return 'thunder';
  return 'cloudy';
}

function scorePerfume(p, ctx) {
  const { temp, condition, season, occasion } = ctx;
  let score = 60;

  // 1. Temperature → ideal weight matching
  let idealWeight;
  if (temp > 25) idealWeight = 1;
  else if (temp > 18) idealWeight = 2;
  else if (temp > 10) idealWeight = 3;
  else if (temp > 2) idealWeight = 4;
  else idealWeight = 5;
  score -= Math.abs(p.weight - idealWeight) * 7;

  // 2. Family fit per temperature bucket
  const fams = p.families;
  const has = (arr) => fams.some(f => arr.includes(f));
  if (temp > 22) {
    if (has(['citrus','aquatic','green','aromatic'])) score += 12;
    if (has(['oriental','gourmand','amber'])) score -= 14;
  } else if (temp < 8) {
    if (has(['oriental','gourmand','amber','woody'])) score += 12;
    if (has(['citrus','aquatic'])) score -= 10;
  }

  // 3. Condition modifiers
  if (condition === 'rain' && has(['green','aromatic','woody'])) score += 5;
  if (condition === 'snow' && has(['gourmand','oriental','amber'])) score += 6;
  if (condition === 'clear' && temp > 15 && has(['citrus','aquatic'])) score += 4;

  // 4. Season fit
  score += (p.seasonFit[season] || 0.5) * 10;

  // 5. Occasion fit
  const idealFormality = occasion === 'formal' ? 5 : 2;
  score -= Math.abs(p.formality - idealFormality) * 5;

  return Math.max(0, Math.min(100, Math.round(score)));
}

function pHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}
function pPick(arr, seed, offset = 0) {
  if (!arr || arr.length === 0) return '';
  return arr[(seed + offset) % arr.length];
}
function pCap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

function generateReasoning(p, ctx, lang) {
  const phrases = REASON_PHRASES[lang] || REASON_PHRASES.en;
  const { temp, condition, occasion } = ctx;
  const seed = pHash(p.id);

  // Weather key — condition overrides temperature
  let weatherKey;
  if (condition === 'snow') weatherKey = 'snow';
  else if (condition === 'rain') weatherKey = 'rain';
  else if (temp >= 25) weatherKey = 'hot';
  else if (temp >= 18) weatherKey = 'warm';
  else if (temp >= 10) weatherKey = 'mild';
  else if (temp >= 2) weatherKey = 'cool';
  else if (temp >= -8) weatherKey = 'cold';
  else weatherKey = 'freezing';

  // Family — pick first one we have phrases for
  const family = p.families.find(f => phrases.family[f]) || p.families[0];
  const familyPool = phrases.family[family] || phrases.family.floral;

  const weatherPhrase = pPick(phrases.weather[weatherKey] || phrases.weather.mild, seed);
  const familyPhrase = pPick(familyPool, seed, 7);
  const outcomePhrase = pPick(phrases.outcome, seed, 13);

  // Vary sentence structure based on seed
  const template = seed % 4;
  let sentence;
  if (template === 0) {
    sentence = `${pCap(familyPhrase)} ${outcomePhrase} ${weatherPhrase}.`;
  } else if (template === 1) {
    sentence = `${pCap(weatherPhrase)}: ${familyPhrase} ${outcomePhrase}.`;
  } else if (template === 2) {
    sentence = `${pCap(familyPhrase)} — ${outcomePhrase} ${weatherPhrase}.`;
  } else {
    sentence = `${pCap(weatherPhrase)} — ${familyPhrase} ${outcomePhrase}.`;
  }

  // Optional occasion remark
  if (occasion === 'formal' && p.formality >= 4) {
    const phrase = pPick(phrases.formal, seed, 19);
    sentence += ` ${pCap(phrase)}.`;
  } else if (occasion === 'laidback' && p.formality <= 3) {
    const phrase = pPick(phrases.casual, seed, 23);
    sentence += ` ${pCap(phrase)}.`;
  }

  return sentence;
}

const ROMAN = ['I', 'II', 'III', 'IV', 'V'];

const FAVORITES_KEY_BASE = 'parfymevelger_favorites';
const THEME_KEY = 'parfymevelger_theme';
const USERS_KEY = 'parfymevelger_users';
const CURRENT_USER_KEY = 'parfymevelger_current_user';

function safeLS() {
  try { return typeof localStorage !== 'undefined' ? localStorage : null; }
  catch { return null; }
}

function favoritesKey(user) {
  return user ? `${FAVORITES_KEY_BASE}_${user}` : FAVORITES_KEY_BASE;
}

function loadFavorites(user) {
  const ls = safeLS();
  if (!ls) return [];
  try {
    const raw = ls.getItem(favoritesKey(user));
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function saveFavorites(user, favs) {
  const ls = safeLS();
  if (!ls) return;
  try { ls.setItem(favoritesKey(user), JSON.stringify(favs)); } catch {}
}

function loadTheme() {
  const ls = safeLS();
  if (!ls) return 'auto';
  const v = ls.getItem(THEME_KEY);
  return (v === 'day' || v === 'night' || v === 'auto') ? v : 'auto';
}

function saveTheme(theme) {
  const ls = safeLS();
  if (!ls) return;
  try { ls.setItem(THEME_KEY, theme); } catch {}
}

function loadUsers() {
  const ls = safeLS();
  if (!ls) return [];
  try {
    const raw = ls.getItem(USERS_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return Array.isArray(parsed) ? parsed : [];
  } catch { return []; }
}

function saveUsers(users) {
  const ls = safeLS();
  if (!ls) return;
  try { ls.setItem(USERS_KEY, JSON.stringify(users)); } catch {}
}

function loadCurrentUser() {
  const ls = safeLS();
  if (!ls) return null;
  try { return ls.getItem(CURRENT_USER_KEY) || null; } catch { return null; }
}

function saveCurrentUser(name) {
  const ls = safeLS();
  if (!ls) return;
  try {
    if (name) ls.setItem(CURRENT_USER_KEY, name);
    else ls.removeItem(CURRENT_USER_KEY);
  } catch {}
}

function deleteUserData(name) {
  const ls = safeLS();
  if (!ls || !name) return;
  try { ls.removeItem(favoritesKey(name)); } catch {}
}

// Read+resize an uploaded image file to a base64 data URL.
// maxSize is the longest side after resize. Returns Promise<string>.
function resizeImageFile(file, maxSize = 400, quality = 0.82) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) return reject(new Error('Not an image'));
    if (file.size > 10 * 1024 * 1024) return reject(new Error('Image too large'));
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let { width, height } = img;
        const scale = Math.min(1, maxSize / Math.max(width, height));
        width = Math.round(width * scale);
        height = Math.round(height * scale);
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try { resolve(canvas.toDataURL('image/jpeg', quality)); }
        catch (err) { reject(err); }
      };
      img.onerror = () => reject(new Error('Image load failed'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('File read failed'));
    reader.readAsDataURL(file);
  });
}

function loadStringFromLS(key) {
  const ls = safeLS();
  if (!ls) return null;
  try { return ls.getItem(key); } catch { return null; }
}
function saveStringToLS(key, value) {
  const ls = safeLS();
  if (!ls) return;
  try {
    if (value) ls.setItem(key, value);
    else ls.removeItem(key);
  } catch {}
}

const IMAGE_CACHE_KEY = 'parfymevelger_images_v1';
const IMAGE_CACHE_TTL = 30 * 24 * 60 * 60 * 1000; // 30 days

function loadImageCache() {
  const ls = safeLS();
  if (!ls) return {};
  try {
    const raw = ls.getItem(IMAGE_CACHE_KEY);
    const parsed = raw ? JSON.parse(raw) : {};
    // Drop expired entries
    const now = Date.now();
    const fresh = {};
    Object.entries(parsed).forEach(([k, v]) => {
      if (v && (now - v.t) < IMAGE_CACHE_TTL) fresh[k] = v;
    });
    return fresh;
  } catch { return {}; }
}

function saveImageCache(cache) {
  const ls = safeLS();
  if (!ls) return;
  try { ls.setItem(IMAGE_CACHE_KEY, JSON.stringify(cache)); } catch {}
}

async function fetchWikipediaImage(perfumeName, house) {
  // Wikipedia search → page summary → thumbnail
  const query = `${perfumeName} ${house} perfume`;
  try {
    const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=1`;
    const sRes = await fetch(searchUrl);
    const sData = await sRes.json();
    const hit = sData?.query?.search?.[0];
    if (!hit) return null;
    // Sanity check: title should mention the perfume name OR the house
    const title = hit.title;
    const lcTitle = title.toLowerCase();
    if (!lcTitle.includes(perfumeName.toLowerCase().split(' ')[0]) && !lcTitle.includes(house.toLowerCase().split(' ')[0])) {
      return null; // unrelated result
    }
    const sumUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`;
    const tRes = await fetch(sumUrl);
    const tData = await tRes.json();
    const img = tData?.thumbnail?.source || tData?.originalimage?.source;
    return img || null;
  } catch {
    return null;
  }
}

// at the top of this file (or window.SUPABASE_CONFIG in HTML).

function getSupabaseClient() {
  try {
    if (typeof window === 'undefined') return null;
    const cfg = window.SUPABASE_CONFIG;
    if (!cfg || !cfg.url || !cfg.anonKey) return null;
    if (!window.supabase || !window.supabase.createClient) return null;
    if (window.__supabaseClient) return window.__supabaseClient;
    window.__supabaseClient = window.supabase.createClient(cfg.url, cfg.anonKey);
    return window.__supabaseClient;
  } catch { return null; }
}

function ParfymeVelger() {
  const [lang, setLang] = useState('no');
  const [query, setQuery] = useState('');
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [location, setLocation] = useState(null);
  const [weather, setWeather] = useState(null);
  const [occasion, setOccasion] = useState('laidback');
  const [gender, setGender] = useState('all');
  const [kind, setKind] = useState('all');
  const [search, setSearch] = useState('');
  const [randomNonce, setRandomNonce] = useState(0);

  // User profile state
  const [users, setUsers] = useState(() => loadUsers());
  const [currentUser, setCurrentUser] = useState(() => loadCurrentUser());
  const [favorites, setFavorites] = useState(() => loadFavorites(loadCurrentUser()));
  const [profileMenuOpen, setProfileMenuOpen] = useState(false);

  // URL hash routing: '#/om' → 'om', '#/profil' → 'profil'
  const parseHash = () => {
    if (typeof window === 'undefined') return '';
    return window.location.hash.replace(/^#\/?/, '');
  };
  const [route, setRoute] = useState(parseHash);
  useEffect(() => {
    const handler = () => setRoute(parseHash());
    window.addEventListener('hashchange', handler);
    window.addEventListener('popstate', handler);
    return () => {
      window.removeEventListener('hashchange', handler);
      window.removeEventListener('popstate', handler);
    };
  }, []);
  const navigateTo = (path) => {
    if (path) window.location.hash = '/' + path;
    else navigateBack();
  };
  const navigateBack = () => {
    if (window.location.hash) {
      history.pushState('', document.title, window.location.pathname + window.location.search);
      setRoute('');
    }
  };
  const aboutOpen = route === 'om';
  const profileModalOpen = route === 'profil';
  const setAboutOpen = (v) => v ? navigateTo('om') : navigateBack();
  const setProfileModalOpen = (v) => v ? navigateTo('profil') : navigateBack();
  const [profileDrawerOpen, setProfileDrawerOpen] = useState(false);
  const [newProfileName, setNewProfileName] = useState('');
  const [favoriteToRemove, setFavoriteToRemove] = useState(null);
  const [profilePic, setProfilePic] = useState(null);
  const [coverPic, setCoverPic] = useState(null);
  const [picUploading, setPicUploading] = useState(false);

  // Shared favorites from URL (?favs=id1,id2,...)
  const [sharedFavs, setSharedFavs] = useState(() => {
    if (typeof window === 'undefined') return [];
    try {
      const params = new URLSearchParams(window.location.search);
      const f = params.get('favs');
      if (!f) return [];
      const ids = f.split(',').map(s => s.trim()).filter(Boolean);
      return ids.filter(id => PERFUMES.find(p => p.id === id));
    } catch { return []; }
  });
  const [shareCopied, setShareCopied] = useState(false);
  const [shareMenuOpen, setShareMenuOpen] = useState(false);

  // Theme state with auto support
  const [theme, setTheme] = useState(() => loadTheme());
  const [systemDark, setSystemDark] = useState(() => {
    try { return typeof window !== 'undefined' && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
    catch { return true; }
  });

  // Persist users + current user
  useEffect(() => { saveUsers(users); }, [users]);
  useEffect(() => { saveCurrentUser(currentUser); }, [currentUser]);
  // When user switches, load that user's favorites
  useEffect(() => { setFavorites(loadFavorites(currentUser)); }, [currentUser]);
  // Persist favorites against current user
  useEffect(() => { saveFavorites(currentUser, favorites); }, [favorites, currentUser]);
  // Persist theme + sync to html element
  const effectiveTheme = theme === 'auto' ? (systemDark ? 'night' : 'day') : theme;
  useEffect(() => {
    saveTheme(theme);
    try { document.documentElement.setAttribute('data-theme', effectiveTheme); } catch {}
  }, [theme, effectiveTheme]);
  // Listen for system theme changes
  useEffect(() => {
    if (typeof window === 'undefined' || !window.matchMedia) return;
    const mql = window.matchMedia('(prefers-color-scheme: dark)');
    const handler = (e) => setSystemDark(e.matches);
    if (mql.addEventListener) mql.addEventListener('change', handler);
    else if (mql.addListener) mql.addListener(handler);
    return () => {
      if (mql.removeEventListener) mql.removeEventListener('change', handler);
      else if (mql.removeListener) mql.removeListener(handler);
    };
  }, []);

  // Direct toggle — used internally. Pass through cloud/local automatically.
  const _commitToggle = async (id) => {
    if (cloudUser && supabase) {
      const isFav = cloudFavorites.includes(id);
      setCloudFavorites(prev => isFav ? prev.filter(x => x !== id) : [...prev, id]);
      try {
        if (isFav) {
          await supabase.from('favorites').delete().eq('user_id', cloudUser.id).eq('perfume_id', id);
        } else {
          await supabase.from('favorites').insert({ user_id: cloudUser.id, perfume_id: id });
        }
      } catch (err) {
        setCloudFavorites(prev => isFav ? [...prev, id] : prev.filter(x => x !== id));
      }
    } else {
      setFavorites(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
    }
  };
  // Public toggle: confirm before removing, add directly without confirmation
  const toggleFavorite = (id) => {
    if (effectiveFavorites.includes(id)) {
      setFavoriteToRemove(id);
    } else {
      _commitToggle(id);
    }
  };
  const confirmRemoveFavorite = () => {
    if (favoriteToRemove) _commitToggle(favoriteToRemove);
    setFavoriteToRemove(null);
  };
  const isFavorite = (id) => effectiveFavorites.includes(id);

  // Build the share URL with current favorites
  const buildShareUrl = () => {
    try {
      const url = new URL(window.location.href);
      url.searchParams.set('favs', effectiveFavorites.join(','));
      return url.toString();
    } catch { return window.location.href; }
  };
  // Share favorites: try Web Share API (mobile native sheet), else open menu
  const shareFavorites = async () => {
    if (effectiveFavorites.length === 0) return;
    const url = buildShareUrl();
    const shareData = {
      title: 'Sillage',
      text: lang === 'no'
        ? 'Min duftsamling på Sillage'
        : 'My fragrance collection on Sillage',
      url,
    };
    if (typeof navigator !== 'undefined' && navigator.share) {
      try {
        await navigator.share(shareData);
        return;
      } catch (e) {
        if (e?.name === 'AbortError') return; // user cancelled
      }
    }
    setShareMenuOpen(true);
  };
  // Copy URL to clipboard, show toast
  const copyShareLink = async () => {
    try {
      await navigator.clipboard.writeText(buildShareUrl());
      setShareCopied(true);
      setTimeout(() => setShareCopied(false), 2500);
    } catch {
      window.prompt(t.shareFavorites + ':', buildShareUrl());
    }
    setShareMenuOpen(false);
  };
  // Open mail client with prefilled subject/body
  const shareViaMail = () => {
    const url = buildShareUrl();
    const subject = lang === 'no' ? 'Min duftsamling på Sillage' : 'My fragrance collection on Sillage';
    const body = (lang === 'no'
      ? `Jeg har laget en samling med mine favorittparfymer på Sillage. Se den her:\n\n${url}`
      : `I made a collection of my favorite perfumes on Sillage. See it here:\n\n${url}`);
    window.location.href = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    setShareMenuOpen(false);
  };
  // Share via WhatsApp (has proper share URL)
  const shareViaWhatsApp = () => {
    const url = buildShareUrl();
    const text = (lang === 'no' ? 'Min duftsamling på Sillage: ' : 'My fragrance collection on Sillage: ') + url;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    setShareMenuOpen(false);
  };
  // Open an app and copy URL to clipboard so user can paste
  const shareViaApp = async (app) => {
    const url = buildShareUrl();
    try { await navigator.clipboard.writeText(url); setShareCopied(true); } catch {}
    const targets = {
      messenger: 'https://www.messenger.com/',
      snap: 'https://web.snapchat.com/',
      instagram: 'https://www.instagram.com/direct/inbox/',
    };
    if (targets[app]) window.open(targets[app], '_blank');
    setTimeout(() => setShareCopied(false), 3500);
    setShareMenuOpen(false);
  };
  // Dismiss the shared view and clean URL
  const dismissShared = () => {
    setSharedFavs([]);
    try {
      const url = new URL(window.location.href);
      url.searchParams.delete('favs');
      window.history.replaceState({}, '', url.toString());
    } catch {}
  };
  // Import shared favorites into my own
  const importShared = () => {
    sharedFavs.forEach(id => {
      if (!effectiveFavorites.includes(id)) _commitToggle(id);
    });
    dismissShared();
  };

  // Supabase auth handlers
  const handleSignIn = async () => {
    if (!supabase) return;
    setAuthLoading(true); setAuthError(null);
    const { error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword });
    setAuthLoading(false);
    if (error) setAuthError(error.message);
    else {
      setProfileModalOpen(false);
      setAuthEmail(''); setAuthPassword('');
    }
  };
  const handleSignUp = async () => {
    if (!supabase) return;
    setAuthLoading(true); setAuthError(null);
    const { error } = await supabase.auth.signUp({
      email: authEmail, password: authPassword,
      options: { data: { display_name: authName || authEmail.split('@')[0] } }
    });
    setAuthLoading(false);
    if (error) setAuthError(error.message);
    else {
      setProfileModalOpen(false);
      setAuthEmail(''); setAuthPassword(''); setAuthName('');
    }
  };
  const handleSignOut = async () => {
    if (!supabase) return;
    await supabase.auth.signOut();
    setCloudFavorites([]);
    setProfileMenuOpen(false);
  };

  const createProfile = () => {
    const name = newProfileName.trim();
    if (!name) return;
    if (!users.includes(name)) setUsers(prev => [...prev, name]);
    setCurrentUser(name);
    setNewProfileName('');
    setProfileModalOpen(false);
    setProfileMenuOpen(false);
  };
  const switchToUser = (name) => {
    setCurrentUser(name);
    setProfileMenuOpen(false);
  };
  const logout = () => {
    setCurrentUser(null);
    setProfileMenuOpen(false);
  };
  const deleteCurrentProfile = () => {
    if (!currentUser) return;
    if (typeof window !== 'undefined' && !window.confirm(t.deleteConfirm)) return;
    deleteUserData(currentUser);
    setUsers(prev => prev.filter(u => u !== currentUser));
    setCurrentUser(null);
    setProfileMenuOpen(false);
  };

  // Image cache for Wikipedia-fetched bottle images
  const [imageCache, setImageCache] = useState(() => loadImageCache());

  // Supabase cloud auth (optional)
  const supabase = useMemo(() => getSupabaseClient(), []);
  const [cloudUser, setCloudUser] = useState(null);
  const [cloudFavorites, setCloudFavorites] = useState([]);
  const [authMode, setAuthMode] = useState('signin'); // 'signin' | 'signup'
  const [authEmail, setAuthEmail] = useState('');
  const [authPassword, setAuthPassword] = useState('');
  const [authName, setAuthName] = useState('');
  const [authError, setAuthError] = useState(null);
  const [authLoading, setAuthLoading] = useState(false);

  // Listen for Supabase auth state
  useEffect(() => {
    if (!supabase) return;
    supabase.auth.getSession().then(({ data: { session } }) => {
      setCloudUser(session?.user ?? null);
    });
    const { data } = supabase.auth.onAuthStateChange((_evt, session) => {
      setCloudUser(session?.user ?? null);
    });
    return () => { try { data?.subscription?.unsubscribe(); } catch {} };
  }, [supabase]);

  // Load favorites from Supabase when signed in
  useEffect(() => {
    if (!supabase || !cloudUser) return;
    let cancelled = false;
    supabase.from('favorites').select('perfume_id').eq('user_id', cloudUser.id)
      .then(({ data, error }) => {
        if (cancelled || error) return;
        setCloudFavorites(data ? data.map(r => r.perfume_id) : []);
      });
    return () => { cancelled = true; };
  }, [supabase, cloudUser]);

  // Effective favorites: cloud if signed in, else local
  const effectiveFavorites = cloudUser ? cloudFavorites : favorites;

  // Profile + cover pictures, keyed per user (cloud or local)
  const profileKey = useMemo(() => {
    if (cloudUser) return `cloud_${cloudUser.id}`;
    if (currentUser) return `local_${currentUser}`;
    return 'anonymous';
  }, [cloudUser, currentUser]);
  useEffect(() => {
    setProfilePic(loadStringFromLS(`parfymevelger_pp_${profileKey}`));
    setCoverPic(loadStringFromLS(`parfymevelger_cp_${profileKey}`));
  }, [profileKey]);
  const handleProfilePicUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPicUploading(true);
    try {
      const data = await resizeImageFile(file, 400, 0.85);
      setProfilePic(data);
      saveStringToLS(`parfymevelger_pp_${profileKey}`, data);
    } catch {} finally { setPicUploading(false); e.target.value = ''; }
  };
  const handleCoverPicUpload = async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    setPicUploading(true);
    try {
      const data = await resizeImageFile(file, 1200, 0.8);
      setCoverPic(data);
      saveStringToLS(`parfymevelger_cp_${profileKey}`, data);
    } catch {} finally { setPicUploading(false); e.target.value = ''; }
  };
  const removeProfilePic = () => { setProfilePic(null); saveStringToLS(`parfymevelger_pp_${profileKey}`, null); };
  const removeCoverPic = () => { setCoverPic(null); saveStringToLS(`parfymevelger_cp_${profileKey}`, null); };

  // Persist image cache
  useEffect(() => { saveImageCache(imageCache); }, [imageCache]);

  // Helper: generate badges for a perfume
  const getBadges = (p) => {
    const out = [];
    if (p.year < 1990) out.push({label: t.badgeClassic, color: 'var(--accent)'});
    if (p.year >= 2018) out.push({label: t.badgeRecent, color: 'var(--rose)'});
    if (p.seasonFit.winter >= 0.95) out.push({label: t.badgeWinter, color: '#7AB5D5'});
    if (p.seasonFit.summer >= 0.95) out.push({label: t.badgeSummer, color: '#D5A85A'});
    if (p.kind === 'niche') out.push({label: t.badgeRare, color: 'var(--accent-warm)'});
    return out.slice(0, 3);
  };
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const t = T[lang];

  // Debounced geocoding search
  useEffect(() => {
    if (!query.trim() || query.trim().length < 2) {
      setSearchResults([]);
      return;
    }
    setSearching(true);
    const handle = setTimeout(async () => {
      try {
        // Open-Meteo geocoding doesn't support 'no' — fall back to 'en' for the query.
        const apiLang = ['en','de','fr','es','it','pt','ru','tr','zh','hi'].includes(lang) ? lang : 'en';
        const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5&language=${apiLang}&format=json`);
        const data = await res.json();
        setSearchResults(data.results || []);
      } catch {
        setSearchResults([]);
      } finally {
        setSearching(false);
      }
    }, 350);
    return () => clearTimeout(handle);
  }, [query, lang]);

  async function fetchWeather(lat, lon) {
    setLoading(true);
    setError(null);
    try {
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&timezone=auto`);
      const data = await res.json();
      setWeather({
        temp: data.current.temperature_2m,
        humidity: data.current.relative_humidity_2m,
        code: data.current.weather_code,
        wind: data.current.wind_speed_10m,
      });
    } catch (e) {
      setError(t.weatherError);
    } finally {
      setLoading(false);
    }
  }

  function pickLocation(loc) {
    const name = loc.name + (loc.admin1 && loc.admin1 !== loc.name ? `, ${loc.admin1}` : '');
    setLocation({
      name,
      country: loc.country || '',
      latitude: loc.latitude,
      longitude: loc.longitude,
    });
    setQuery('');
    setSearchResults([]);
    fetchWeather(loc.latitude, loc.longitude);
  }

  async function useMyLocation() {
    setLoading(true);
    setError(null);

    // Try browser geolocation first (precise, works on deployed sites).
    // Fall back to IP geolocation (works everywhere, including sandboxed iframes).
    const tryBrowserGeo = () => new Promise((resolve) => {
      if (!navigator.geolocation) return resolve(null);
      try {
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve(pos.coords),
          () => resolve(null),
          { timeout: 5000, maximumAge: 60000 }
        );
      } catch {
        resolve(null);
      }
    });

    const tryIP = async () => {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        if (data.latitude && data.longitude) {
          return {
            latitude: data.latitude,
            longitude: data.longitude,
            city: data.city,
            country: data.country_name,
            fromIP: true,
          };
        }
      } catch {}
      return null;
    };

    let result = await tryBrowserGeo();
    let cityFromIP = null;

    if (!result) {
      const ip = await tryIP();
      if (ip) {
        result = { latitude: ip.latitude, longitude: ip.longitude };
        cityFromIP = ip;
      }
    }

    if (!result) {
      setError(t.geoError);
      setLoading(false);
      return;
    }

    const { latitude, longitude } = result;

    if (cityFromIP) {
      setLocation({
        name: cityFromIP.city || `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`,
        country: cityFromIP.country || '',
        latitude, longitude,
      });
    } else {
      try {
        const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${latitude}&longitude=${longitude}&localityLanguage=${lang}`);
        const data = await res.json();
        setLocation({
          name: data.city || data.locality || data.principalSubdivision || `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`,
          country: data.countryName || '',
          latitude, longitude,
        });
      } catch {
        setLocation({ name: `${latitude.toFixed(2)}, ${longitude.toFixed(2)}`, country: '', latitude, longitude });
      }
    }

    fetchWeather(latitude, longitude);
  }

  const recommendations = useMemo(() => {
    if (!weather) return [];
    const ctx = {
      temp: weather.temp,
      humidity: weather.humidity,
      condition: weatherCondition(weather.code),
      season: getSeason(new Date().getMonth() + 1),
      occasion,
    };
    const genderMatch = (p) => {
      if (gender === 'all') return true;
      if (gender === 'unisex') return p.gender === 'unisex';
      return p.gender === gender || p.gender === 'unisex';
    };
    const kindMatch = (p) => kind === 'all' || p.kind === kind;
    const searchMatch = (p) => {
      const q = search.trim().toLowerCase();
      if (!q) return true;
      if (p.name.toLowerCase().includes(q)) return true;
      if (p.house.toLowerCase().includes(q)) return true;
      if (p.accords.some(a => a.toLowerCase().includes(q))) return true;
      if (Object.values(p.notes).flat().some(n => n.toLowerCase().includes(q))) return true;
      return false;
    };
    const filtered = PERFUMES.filter(p => genderMatch(p) && kindMatch(p) && searchMatch(p));

    if (randomNonce > 0) {
      // Random pick mode: shuffle, but still attach scores
      const shuffled = [...filtered].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, 3).map(p => ({
        ...p,
        score: scorePerfume(p, ctx),
        reasoning: generateReasoning(p, ctx, lang),
      }));
    }

    return filtered
      .map(p => ({ ...p, score: scorePerfume(p, ctx), reasoning: generateReasoning(p, ctx, lang) }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3);
  }, [weather, occasion, gender, kind, lang, search, randomNonce]);

  const condition = weather ? weatherCondition(weather.code) : null;

  // Fetch Wikipedia images for current recommendations + favorites
  // NOTE: Currently disabled — we use HouseLogo treatment instead of product images.
  // Keep this code in case we want to bring images back later.
  useEffect(() => {
    return; // disabled — using HouseLogo
    /* eslint-disable */
    const toFetch = new Set();
    recommendations.forEach(p => {
      if (!imageCache[p.id]) toFetch.add(p.id);
    });
    effectiveFavorites.forEach(fid => {
      if (!imageCache[fid]) {
        const p = PERFUMES.find(x => x.id === fid);
        if (p) toFetch.add(fid);
      }
    });
    if (toFetch.size === 0) return;
    let cancelled = false;
    (async () => {
      const newEntries = {};
      for (const pid of toFetch) {
        const p = PERFUMES.find(x => x.id === pid);
        if (!p) continue;
        const url = await fetchWikipediaImage(p.name, p.house);
        if (cancelled) return;
        newEntries[pid] = { url, t: Date.now() };
      }
      if (!cancelled && Object.keys(newEntries).length) {
        setImageCache(prev => ({ ...prev, ...newEntries }));
      }
    })();
    return () => { cancelled = true; };
  }, [recommendations, effectiveFavorites]);

  return (
    <div className="pv-root" style={{ color: 'var(--ink)', minHeight: '100vh' }}>
      <style>{`

          --card-shadow: 0 1px 30px -8px rgba(0,0,0,0.5);

        }
        .pv-root[data-theme="day"],
        html[data-theme="day"] {
          --bg: #F2EAD8;
          --bg-deep: #E8DEC8;
          --paper: #FAF4E5;

          --ink-faint: #9A8975;
          --accent: #8B5A2B;
          --accent-warm: #B8784F;
          --accent-deep: #5C3818;
          --accent-glow: rgba(139, 90, 43, 0.18);
          --rose: #9A4555;
          --rule: #D9CFBE;
          --rule-soft: #E8DFCC;
          --atm-1: rgba(139,90,43,0.06);

          transition: color 0.25s ease;
        }
        .pv-nav-link:hover { color: var(--accent); }
      `}</style>

      {/* TOP FRAME — sticky banner with Logo + controls + Om */}

                {code: 'no', label: 'NO'},

            {/* Profile chip */}

              )}
            </div>

            {/* Profile pic + name */}
            <div className="px-6 -mt-12 pb-2">
              <div className="relative inline-block">
                <div className="rounded-full overflow-hidden flex items-center justify-center pv-display"
                  style={{
                    width:'88px', height:'88px',
                    background: profilePic ? 'var(--bg)' : 'var(--accent)',
                    color:'var(--bg)',
                    fontSize:'34px', fontWeight:300,
                    border:'4px solid var(--paper)',
                    boxShadow:'0 8px 24px -8px rgba(0,0,0,0.4)',
                  }}>
                  {profilePic
                    ? <img src={profilePic} alt="" style={{width:'100%', height:'100%', objectFit:'cover'}}/>
                    : (cloudUser?.user_metadata?.display_name || cloudUser?.email || currentUser || '?').charAt(0).toUpperCase()
                  }
                </div>
                <label className="absolute bottom-0 right-0 cursor-pointer inline-flex items-center justify-center"
                  style={{
                    width:28, height:28, borderRadius:'999px',
                    background:'var(--accent)', color:'var(--bg)',
                    border:'2px solid var(--paper)',
                  }}
                  title={profilePic ? t.changeProfilePic : t.uploadProfilePic}>
                  <Edit3 size={12}/>
                  <input type="file" accept="image/*" onChange={handleProfilePicUpload} style={{display:'none'}}/>
                </label>
                {profilePic && (
                  <button onClick={removeProfilePic}
                    className="absolute -top-1 -right-1 inline-flex items-center justify-center"
                    style={{
                      width:22, height:22, borderRadius:'999px',
                      background:'var(--rose)', color:'var(--bg)',
                      border:'2px solid var(--paper)', cursor:'pointer',
                    }}
                    title={t.removePicture}>
                    <X size={10}/>
                  </button>
                )}
              </div>
              <h2 className="pv-display text-3xl mt-4" style={{fontWeight:300, letterSpacing:'-0.01em', color:'var(--ink)'}}>
                {cloudUser
                  ? (cloudUser.user_metadata?.display_name || cloudUser.email.split('@')[0])
                  : currentUser}
              </h2>
              <p className="pv-body text-xs mt-1" style={{color:'var(--ink-soft)'}}>
                {cloudUser ? cloudUser.email : t.localProfile}
              </p>
              <p className="pv-body text-[10px] uppercase tracking-[0.25em] mt-3" style={{color:'var(--accent)'}}>
                {cloudUser ? '☁ ' + t.cloudSync : '◆ ' + t.localOnly}
              </p>
            </div>

            {/* Stats */}
            <div className="px-6 py-5 mt-2" style={{borderTop:'1px solid var(--rule-soft)', borderBottom:'1px solid var(--rule-soft)'}}>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <div className="pv-display text-3xl" style={{fontWeight:300, color:'var(--accent)', lineHeight:1}}>
                    {effectiveFavorites.length}
                  </div>
                  <div className="pv-body text-[9px] uppercase tracking-[0.25em] mt-1" style={{color:'var(--ink-faint)'}}>
                    {effectiveFavorites.length === 1 ? t.favorite : t.favorites}
                  </div>
                </div>
                <div>
                  <div className="pv-display text-3xl" style={{fontWeight:300, color:'var(--accent)', lineHeight:1}}>
                    {new Set(effectiveFavorites.map(id => PERFUMES.find(p=>p.id===id)?.house).filter(Boolean)).size}
                  </div>
                  <div className="pv-body text-[9px] uppercase tracking-[0.25em] mt-1" style={{color:'var(--ink-faint)'}}>
                    {lang === 'no' ? 'Hus' : 'Houses'}
                  </div>
                </div>
              </div>
            </div>

            {/* Favorites preview */}
            <div className="px-6 py-5">
              <div className="flex items-baseline justify-between mb-3">
                <h3 className="pv-display text-base" style={{fontWeight:400, letterSpacing:'0.04em', color:'var(--ink)'}}>
                  {t.yourCollection}
                </h3>
                {effectiveFavorites.length > 5 && (
                  <a href="#favorites" onClick={() => setProfileDrawerOpen(false)}
                    className="pv-link-btn text-[10px]">
                    {t.seeAll} →
                  </a>
                )}
              </div>
              {effectiveFavorites.length === 0 ? (
                <p className="pv-body text-xs italic" style={{color:'var(--ink-faint)', lineHeight:1.5}}>
                  {t.noFavoritesYet}
                </p>
              ) : (
                <div className="space-y-2">
                  {effectiveFavorites.slice(0, 5).map(fid => {
                    const p = PERFUMES.find(x => x.id === fid);
                    if (!p) return null;
                    const fUrl = `https://www.fragrantica.com/search/?query=${encodeURIComponent(p.name + ' ' + p.house)}`;
                    return (
                      <a key={fid} href={fUrl} target="_blank" rel="noopener noreferrer"
                        className="flex items-center justify-between gap-3 p-2 rounded transition-colors"
                        style={{border:'1px solid var(--rule-soft)', textDecoration:'none', background:'rgba(212,165,116,0.03)'}}>
                        <div className="min-w-0 flex-1">
                          <div className="pv-display text-sm truncate" style={{fontWeight:400, color:'var(--ink)'}}>
                            {p.name}
                          </div>
                          <div className="pv-body text-[9px] uppercase tracking-[0.22em] mt-0.5 truncate" style={{color:'var(--ink-faint)'}}>
                            {p.house}
                          </div>
                        </div>
                        <div style={{
                          width:'24px', height:'2px', flexShrink:0,
                          background: `linear-gradient(90deg, ${p.gradient[0]}, ${p.gradient[1]})`,
                          borderRadius:'1px',
                        }}/>
                      </a>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Account actions */}
            <div className="px-6 py-5 mt-2" style={{borderTop:'1px solid var(--rule-soft)'}}>
              <div className="pv-body text-[9px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--ink-faint)'}}>
                {t.accountSettings}
              </div>
              <div className="space-y-2">
                {cloudUser ? (
                  <button onClick={() => { handleSignOut(); setProfileDrawerOpen(false); }}
                    className="pv-link-btn w-full text-left">
                    {t.logout}
                  </button>
                ) : (
                  <>
                    {users.length > 1 && (
                      <>
                        <div className="pv-body text-[9px] uppercase tracking-[0.25em] mb-1" style={{color:'var(--ink-faint)'}}>
                          {t.switchProfile}
                        </div>
                        {users.filter(u => u !== currentUser).map(u => (
                          <button key={u} onClick={() => { switchToUser(u); setProfileDrawerOpen(false); }}
                            className="pv-link-btn w-full text-left">
                            → {u}
                          </button>
                        ))}
                      </>
                    )}
                    <button onClick={() => { setProfileModalOpen(true); setProfileDrawerOpen(false); }}
                      className="pv-link-btn w-full text-left">
                      + {supabase ? t.signIn : t.newProfile}
                    </button>
                    <button onClick={() => { logout(); setProfileDrawerOpen(false); }}
                      className="pv-link-btn w-full text-left">
                      {t.logout}
                    </button>
                    <button onClick={() => { deleteCurrentProfile(); setProfileDrawerOpen(false); }}
                      className="pv-link-btn w-full text-left" style={{color:'var(--rose)'}}>
                      {t.deleteProfile}
                    </button>
                  </>
                )}
              </div>
            </div>
          </aside>
        </>
      )}

      {/* OM / ABOUT — full-screen page */}
      {aboutOpen && (
        <div className="fixed inset-0 z-50 overflow-y-auto pv-fade-in"
          style={{background:'var(--bg)'}}>
          {/* Top bar */}
          <div className="absolute top-0 left-0 right-0 px-6 md:px-10 py-6 flex items-center justify-between z-10">
            <button onClick={() => setAboutOpen(false)}
              className="pv-link-btn inline-flex items-center gap-2">
              ← {t.aboutBack}
            </button>
            <div className="pv-display-it text-2xl" style={{fontWeight:300, color:'var(--accent)'}}>
              {t.title}
            </div>
          </div>

          {/* Centered content */}
          <div className="min-h-screen flex items-center justify-center px-6 md:px-10 py-24">
            <div className="max-w-2xl w-full">
              <div className="pv-body text-[11px] uppercase tracking-[0.32em] mb-5" style={{color:'var(--accent)'}}>
                {t.aboutProjectLabel}
              </div>
              <h1 className="pv-display text-5xl md:text-7xl mb-8"
                style={{fontWeight:300, letterSpacing:'-0.03em', lineHeight:1}}>
                <span className="pv-display-it">{t.aboutNavLabel}.</span>
              </h1>
              <div className="pv-rule-decorative mb-8" style={{width:'80px'}}/>
              <p className="pv-display-it text-xl md:text-2xl mb-8"
                style={{color:'var(--ink)', fontWeight:300, lineHeight:1.5}}>
                {t.aboutProjectText}
              </p>
              <div className="pv-body text-sm mt-12 pt-6" style={{color:'var(--ink-faint)', borderTop:'1px solid var(--rule-soft)'}}>
                <div className="grid sm:grid-cols-2 gap-6">
                  <div>
                    <div className="text-[9px] uppercase tracking-[0.32em] mb-2" style={{color:'var(--accent)'}}>
                      {lang === 'no' ? 'Katalog' : 'Catalog'}
                    </div>
                    <div style={{color:'var(--ink-soft)'}}>
                      {PERFUMES.length} {lang === 'no' ? 'parfymer' : 'perfumes'} ·{' '}
                      {PERFUMES.filter(p=>p.kind==='niche').length} {lang === 'no' ? 'nisje' : 'niche'} ·{' '}
                      {PERFUMES.filter(p=>p.kind==='designer').length} {lang === 'no' ? 'designer' : 'designer'}
                    </div>
                  </div>
                  <div>
                    <div className="text-[9px] uppercase tracking-[0.32em] mb-2" style={{color:'var(--accent)'}}>
                      {lang === 'no' ? 'Vær fra' : 'Weather via'}
                    </div>
                    <div style={{color:'var(--ink-soft)'}}>
                      Open-Meteo
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* PROFILE CREATION — full-screen page */}
      {profileModalOpen && (
        <div className="fixed inset-0 z-50 overflow-y-auto pv-fade-in"
          style={{background:'var(--bg)'}}>
          {/* Top bar with close */}
          <div className="absolute top-0 left-0 right-0 px-6 md:px-10 py-6 flex items-center justify-between z-10">
            <button onClick={() => setProfileModalOpen(false)}
              className="pv-link-btn inline-flex items-center gap-2">
              ← {t.cancel}
            </button>
            <div className="pv-display-it text-2xl" style={{fontWeight:300, color:'var(--accent)'}}>
              {t.title}
            </div>
          </div>

          {/* Centered form */}
          <div className="min-h-screen flex items-center justify-center px-6 md:px-10 py-24">
            <div className="pv-card p-8 md:p-12 max-w-lg w-full"
              style={{boxShadow:'0 40px 80px -20px rgba(0,0,0,0.5)'}}>

              {supabase ? (
                <>
                  <div className="pv-body text-[10px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--accent)'}}>
                    ☁ {t.cloudSync}
                  </div>
                  <h3 className="pv-display text-4xl md:text-5xl mb-3" style={{fontWeight:300, letterSpacing:'-0.02em'}}>
                    {authMode === 'signin' ? t.signIn : t.signUp}
                  </h3>
                  <p className="pv-display-it text-base md:text-lg mb-8" style={{color:'var(--ink-soft)', fontWeight:300}}>
                    {t.welcomeIntro}
                  </p>

                  {authMode === 'signup' && (
                    <>
                      <label className="pv-body text-[10px] uppercase tracking-[0.25em] block mb-1" style={{color:'var(--ink-faint)'}}>
                        {t.profileName}
                      </label>
                      <input type="text" value={authName} onChange={e => setAuthName(e.target.value)}
                        placeholder={t.profilePlaceholder} className="pv-input mb-4"/>
                    </>
                  )}

                  <label className="pv-body text-[10px] uppercase tracking-[0.25em] block mb-1" style={{color:'var(--ink-faint)'}}>
                    {t.email}
                  </label>
                  <input type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)}
                    placeholder={t.emailPlaceholder} className="pv-input mb-4" autoFocus/>

                  <label className="pv-body text-[10px] uppercase tracking-[0.25em] block mb-1" style={{color:'var(--ink-faint)'}}>
                    {t.password}
                  </label>
                  <input type="password" value={authPassword} onChange={e => setAuthPassword(e.target.value)}
                    onKeyDown={(e) => { if (e.key === 'Enter') (authMode === 'signin' ? handleSignIn : handleSignUp)(); }}
                    placeholder={t.passwordPlaceholder} className="pv-input mb-6"/>

                  {authError && (
                    <div className="pv-body text-sm mb-4" style={{color:'var(--rose)'}}>{authError}</div>
                  )}

                  <div className="flex justify-between items-center gap-4 flex-wrap">
                    <button onClick={() => { setAuthMode(authMode === 'signin' ? 'signup' : 'signin'); setAuthError(null); }} className="pv-link-btn">
                      {authMode === 'signin' ? t.noAccount + ' ' + t.signUp : t.haveAccount + ' ' + t.signIn}
                    </button>
                    <button onClick={authMode === 'signin' ? handleSignIn : handleSignUp} className="pv-toggle-btn active"
                      style={{cursor: authLoading ? 'wait' : 'pointer', opacity: authLoading ? 0.6 : 1}}
                      disabled={authLoading}>
                      {authLoading ? '…' : (authMode === 'signin' ? t.signIn : t.signUp)}
                    </button>
                  </div>
                </>
              ) : (
                <>
                  {users.length > 0 ? (
                    // Existing local profiles — show sign-in picker + option to create new
                    <>
                      <div className="pv-body text-[10px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--accent)'}}>
                        ◆ {t.signIn}
                      </div>
                      <h3 className="pv-display text-4xl md:text-5xl mb-3" style={{fontWeight:300, letterSpacing:'-0.02em'}}>
                        {t.welcomeBack}.
                      </h3>
                      <p className="pv-display-it text-base md:text-lg mb-7" style={{color:'var(--ink-soft)', fontWeight:300}}>
                        {t.chooseProfile}
                      </p>
                      <div className="space-y-2 mb-7">
                        {users.map(u => (
                          <button key={u} onClick={() => { switchToUser(u); setProfileModalOpen(false); }}
                            className="flex items-center justify-between gap-3 w-full p-3 transition-colors"
                            style={{border:'1px solid var(--rule)', background:'rgba(212,165,116,0.04)', cursor:'pointer'}}>
                            <div className="flex items-center gap-3">
                              <span className="inline-flex items-center justify-center w-8 h-8 rounded-full pv-display"
                                style={{background:'var(--accent)', color:'var(--bg)', fontSize:'13px', fontWeight:500}}>
                                {u.charAt(0).toUpperCase()}
                              </span>
                              <span className="pv-display text-lg" style={{fontWeight:400, color:'var(--ink)'}}>
                                {u}
                              </span>
                            </div>
                            <span style={{color:'var(--accent)'}}>→</span>
                          </button>
                        ))}
                      </div>
                      <div className="pv-body text-[10px] uppercase tracking-[0.25em] text-center my-5" style={{color:'var(--ink-faint)'}}>
                        {t.orCreateNew}
                      </div>
                      <label className="pv-body text-[10px] uppercase tracking-[0.25em] block mb-1" style={{color:'var(--ink-faint)'}}>
                        {t.profileName}
                      </label>
                      <input
                        type="text"
                        value={newProfileName}
                        onChange={(e) => setNewProfileName(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') createProfile(); }}
                        placeholder={t.profilePlaceholder}
                        className="pv-input mb-5"
                      />
                      <div className="flex justify-end">
                        <button onClick={createProfile} className="pv-toggle-btn"
                          style={{cursor: newProfileName.trim() ? 'pointer' : 'not-allowed', opacity: newProfileName.trim() ? 1 : 0.5}}
                          disabled={!newProfileName.trim()}>
                          + {t.newProfile}
                        </button>
                      </div>
                    </>
                  ) : (
                    // No profiles yet — first-time create
                    <>
                      <div className="pv-body text-[10px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--accent)'}}>
                        {t.newProfile}
                      </div>
                      <h3 className="pv-display text-4xl md:text-5xl mb-3" style={{fontWeight:300, letterSpacing:'-0.02em'}}>
                        {t.welcomeNew}.
                      </h3>
                      <p className="pv-display-it text-base md:text-lg mb-8" style={{color:'var(--ink-soft)', fontWeight:300}}>
                        {t.welcomeIntro}
                      </p>
                      <label className="pv-body text-[10px] uppercase tracking-[0.25em] block mb-1" style={{color:'var(--ink-faint)'}}>
                        {t.profileName}
                      </label>
                      <input
                        type="text"
                        value={newProfileName}
                        onChange={(e) => setNewProfileName(e.target.value)}
                        onKeyDown={(e) => { if (e.key === 'Enter') createProfile(); }}
                        placeholder={t.profilePlaceholder}
                        className="pv-input mb-6"
                        autoFocus
                      />
                      <div className="flex justify-end">
                        <button onClick={createProfile} className="pv-toggle-btn active"
                          style={{cursor: newProfileName.trim() ? 'pointer' : 'not-allowed', opacity: newProfileName.trim() ? 1 : 0.5}}
                          disabled={!newProfileName.trim()}>
                          {t.save} →
                        </button>
                      </div>
                    </>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}
      {/* SHARE MENU — opens when Web Share API not available, or user wants choice */}
      {shareMenuOpen && (
        <div className="fixed inset-0 z-50 flex items-start justify-center p-6"
          style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(6px)', paddingTop:'10vh'}}
          onClick={() => setShareMenuOpen(false)}>
          <div className="pv-card p-7 md:p-8 max-w-sm w-full"
            onClick={(e) => e.stopPropagation()}
            style={{boxShadow:'0 30px 60px -15px rgba(0,0,0,0.6)'}}>
            <div className="pv-body text-[10px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--accent)'}}>
              ✦ {t.shareMenuTitle}
            </div>
            <p className="pv-body text-xs mb-5" style={{color:'var(--ink-soft)', lineHeight:1.55}}>
              {t.shareMenuSubtitle}
            </p>
            {shareCopied && (
              <div className="pv-body text-[11px] mb-4 px-3 py-2"
                style={{color:'var(--accent)', background:'rgba(212,165,116,0.1)', border:'1px solid var(--accent)'}}>
                ✓ {t.linkCopiedPaste}
              </div>
            )}
            <div className="space-y-1">
              <button onClick={shareViaMail} className="pv-link-btn w-full text-left">
                → {t.shareViaMail}
              </button>
              <button onClick={() => shareViaApp('messenger')} className="pv-link-btn w-full text-left">
                → {t.shareViaMessenger}
              </button>
              <button onClick={() => shareViaApp('snap')} className="pv-link-btn w-full text-left">
                → {t.shareViaSnap}
              </button>
              <button onClick={() => shareViaApp('instagram')} className="pv-link-btn w-full text-left">
                → {t.shareViaInstagram}
              </button>
              <button onClick={shareViaWhatsApp} className="pv-link-btn w-full text-left">
                → {t.shareViaWhatsApp}
              </button>
              <div className="my-2" style={{height:'1px', background:'var(--rule-soft)'}}/>
              <button onClick={copyShareLink} className="pv-link-btn w-full text-left"
                style={{color:'var(--accent)'}}>
                → {t.shareCopyLink}
              </button>
            </div>
            <div className="mt-5 flex justify-end">
              <button onClick={() => setShareMenuOpen(false)} className="pv-link-btn">
                {t.dismiss}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* CONFIRM REMOVE FAVORITE MODAL */}
      {favoriteToRemove && (() => {
        const p = PERFUMES.find(x => x.id === favoriteToRemove);
        return (
          <div className="fixed inset-0 z-50 flex items-start justify-center p-6"
            style={{background:'rgba(0,0,0,0.6)', backdropFilter:'blur(6px)', paddingTop:'10vh'}}
            onClick={() => setFavoriteToRemove(null)}>
            <div className="pv-card p-8 max-w-sm w-full"
              onClick={(e) => e.stopPropagation()}
              style={{boxShadow:'0 30px 60px -15px rgba(0,0,0,0.6)'}}>
              <div className="pv-body text-[10px] uppercase tracking-[0.32em] mb-3" style={{color:'var(--rose)'}}>
                {t.confirmRemoveTitle}
              </div>
              {p && (
                <h3 className="pv-display-it text-2xl md:text-3xl mb-3"
                  style={{fontWeight:300, letterSpacing:'-0.01em', color:'var(--ink)'}}>
                  "{p.name}"
                </h3>
              )}
              <p className="pv-body text-sm mb-6" style={{color:'var(--ink-soft)'}}>
                {t.confirmRemoveBody}
              </p>
              <div className="flex justify-end gap-4">
                <button onClick={() => setFavoriteToRemove(null)} className="pv-link-btn">
                  {t.cancel}
                </button>
                <button onClick={confirmRemoveFavorite} className="pv-toggle-btn"
                  style={{background:'var(--rose)', color:'var(--bg)', borderColor:'var(--rose)'}}>
                  {t.confirmRemoveAction}
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

    // Mount the app and hide the loader
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ParfymeVelger />);
    setTimeout(() => {
      const loader = document.getElementById('initial-loader');
      if (loader) loader.classList.add('hidden');
      setTimeout(() => loader && loader.remove(), 500);
    }, 200);
  </script>
</body>
</html>
